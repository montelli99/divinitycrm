services:
  # Backend API
  - type: web
    runtime: node
    name: divinitycrm-api
    region: oregon
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: RABBITSIGN_API_KEY
        sync: false
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://divinitycrm-ggi5.onrender.com/api
      - key: FRONTEND_URL
        value: https://divinitycrm-ggi5.onrender.com

  # Frontend Static Site
  - type: static_site
    name: divinitycrm
    runtime: node
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishDir: dist
    plan: free
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_BASE
        value: https://divinitycrm-ggi5.onrender.com/api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://divinitycrm-ggi5.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html
